version: '3.8'

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: makicore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: makicore
      POSTGRES_USER: makicore
      POSTGRES_PASSWORD: makicore_secret_2026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U makicore"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: makicore-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend NestJS ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: makicore-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://makicore:makicore_secret_2026@postgres:5432/makicore?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: makicore-jwt-secret-change-in-production-2026
      JWT_REFRESH_SECRET: makicore-refresh-secret-change-in-production-2026
      JWT_EXPIRATION: 8h
      JWT_REFRESH_EXPIRATION: 7d
      PORT: 4001
      CORS_ORIGIN: http://localhost:4000
    ports:
      - "4001:4001"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

  # ── Frontend Next.js ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: makicore-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4001/api/v1
      NEXT_PUBLIC_WS_URL: http://localhost:4001
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
  redis_data:
